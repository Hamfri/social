name: deploy
on:
  push:
    tags:
      - "v*" # Trigger only on version tags
permissions:
  id-token: "write" # Required for WIF
  contents: "read"

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: '${{ secrets.GCP_REGION }}-docker.pkg.dev'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Build and push
        id: build-step
        run: |
          VERSION=${GITHUB_REF_NAME}
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/social-repo/api:${VERSION}"
          docker build --build-arg VERSION=${VERSION} -t $IMAGE .
          docker push $IMAGE
          echo "image_url=$IMAGE" >> $GITHUB_OUTPUT

      ## This ensures the DB is ready BEFORE the new API starts
      # - name: Run Migrations
      #   run: |
      #     gcloud run jobs execute social-migration-job \
      #       --region ${{ secrets.GCP_REGION }} \
      #       --wait

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: social-api
          image: ${{ steps.build-step.outputs.image_url }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
