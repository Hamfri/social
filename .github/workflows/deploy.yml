name: deploy
on:
  push:
    tags:
      - "v*" # Trigger only on version tags
permissions:
  id-token: "write" # Required for WIF
  contents: "read"

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # 1. Authenticate to GCP
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 2. Login to Docker
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: 'europe-west1-docker.pkg.dev'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      # 3. Build Docker image
      - name: Build and push
        run: |
          VERSION=${GITHUB_REF_NAME}
          IMAGE="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/api:${VERSION}"
          docker build --build-arg VERSION=${VERSION} -t $IMAGE .
          docker push $IMAGE
      # 4. Run Migrations (Using a Cloud Run Job)
      ## This ensures the DB is ready BEFORE the new API starts
      # - name: Run Migrations
      #   run: |
      #     gcloud run jobs execute social-migration-job \
      #       --region us-central1 \
      #       --wait
      # 4. Deploy
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: social-api
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/api:${{ github.ref_name }}
          region: europe-west1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
