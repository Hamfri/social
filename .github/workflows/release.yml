name: release
on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
permissions:
  contents: write
  pull-requests: write
name: release
jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple