name: bump-version
on:
  pull_request:
    types: [closed]
    branches:
      - main
permissions:
  contents: write
jobs:
  bump-version:
    if: >
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release-please')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Extract current version from changelog
        id: get_version
        run: |
          VERSION=$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Bump version in api/main.go
        run: |
          sed -i "s/^const version = \".*\"/const version = \"${{ steps.get_version.outputs.VERSION }}\"/" cmd/api/main.go
      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "Github Action"
          git add cmd/api/main.go
          git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}


