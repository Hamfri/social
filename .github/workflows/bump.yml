name: bump-version
on:
  workflow_run:
    workflows: ["release"]
    types:
      - completed
permissions:
  contents: write
jobs:
  bump-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Extract current version from changelog
        id: get_version
        run: |
          VERSION=$(grep -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Bump version in api/main.go
        run: |
          sed -i "s/^const version = \".*\"/const version = \"${{ steps.get_version.outputs.VERSION }}\"/" cmd/api/main.go
      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "Github Action"
          git add cmd/api/main.go
          git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}


