name: audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
    - name: Verify Dependencies
      run: go mod verify
    - name: Run go vet
      run: go vet ./...
    - name: Build
      run: go build -v ./...
    - name: Install staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest
    - name: Run static analysis
      run: staticcheck ./...
    - name: Run tests
      run: go test -race ./..